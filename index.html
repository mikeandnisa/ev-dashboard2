<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCI Dashboard</title>
    
    <script src="https://cjrtnc.leaningtech.com/2.3/loader.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        #loading-message {
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="loading-message">
        <h2>⚡ Loading SDG EV Dashboard System...</h2>
        <p style="color: gray;">This may take a few seconds on the first load.</p>
    </div>

    <script>
        // Start the engine
        cheerpJInit();
        
        // Create the display window to match your Java file's 1000x750 size
        cheerpJCreateDisplay(1000, 750);
        
        // Run your exact class name from your exact JAR file
        cheerpJRunMain("InteractiveDashboard3", "InteractiveDashboard3.jar");
    </script>

</body>
</html>
